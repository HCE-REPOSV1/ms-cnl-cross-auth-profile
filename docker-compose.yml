# docker-compose.yml — ms-cnl-cross-auth-profile (producción)
# Uso: docker compose up -d
#
# Los secretos se cargan desde Vault al arrancar.
# VAULT_TOKEN vive en .env.docker (una sola línea, nunca commitear).
# Actualizar .env.docker cuando se regeneren tokens con vault-init.

services:
  ms-cnl-cross-auth-profile:
    build: .
    env_file:
      - .env.docker
    ports:
      - "10701:10701"
      - "20701:20701"
    environment:
      NODE_ENV: production
      PORT: "10701"
      VAULT_ADDR: "http://host.docker.internal:8200"
      VAULT_SECRET_PATH: "hce/nestjs/cnl-cross-auth-profile"
    volumes:
      - /proyectos/certs:/proyectos/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:10701/auth/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
