# docker-compose.dev.yml — aa-pruebas-auth (desarrollo local con Docker)
# Uso: docker compose -f docker-compose.dev.yml up -d
#
# Lee las variables directamente del .env local.
# Para desarrollo sin Docker usa: npm run start:dev

services:
  aa-pruebas-auth:
    build: .
    ports:
      - "${PORT:-10402}:${PORT:-10402}"
    env_file: .env
    environment:
      NODE_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
