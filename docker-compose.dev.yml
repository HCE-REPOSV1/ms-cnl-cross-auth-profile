# docker-compose.dev.yml — ms-cnl-cross-auth-profile (desarrollo local con Docker)
# Uso: docker compose -f docker-compose.dev.yml up -d
#
# Lee las variables directamente del .env local.
# Para desarrollo sin Docker usa: npm run start:dev

services:
  ms-cnl-cross-auth-profile:
    build: .
    ports:
      - "${PORT:-10701}:${PORT:-10701}"
      - "${SSL_PORT:-20701}:${SSL_PORT:-20701}"
    env_file: .env
    environment:
      NODE_ENV: development
    volumes:
      # Certificado autofirmado de prueba (generado con openssl, nunca commiteado — ver .gitignore)
      - ./certs-dev:/app/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
